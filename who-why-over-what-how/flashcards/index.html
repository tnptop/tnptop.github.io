<head>
<meta charset="utf-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Who/Why · Flashcards</title>
<style>
  :root {
    --paper: #F4F1EA;
    --ink:   #1B2233;
    --amber: #E6A23C;
    --slate: #6E7689;
    --rule:  rgba(27, 34, 51, 0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Sukhumvit Set', 'Sarabun', 'Helvetica Neue', sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    flex: 0 0 auto;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
  }
  .badge {
    font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
    font-weight: 600; font-size: 17px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--amber);
  }
  .counter {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 15px; color: var(--slate);
  }
  main {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 22px 20px 24px;
  }
  .card p {
    margin: 0 0 18px;
    font-size: 23px;
    line-height: 1.55;
    font-weight: 400;
  }
  .card p:last-child { margin-bottom: 0; }
  .card p.hero {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.3;
    color: var(--ink);
    padding: 8px 0;
  }
  .card p.hero .accent { color: var(--amber); }
  footer {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 14px 16px;
    border-top: 1px solid var(--rule);
    background: var(--paper);
  }
  button {
    appearance: none; border: none;
    background: var(--ink); color: var(--paper);
    font: inherit; font-weight: 600; font-size: 20px;
    padding: 18px 16px;
    border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.12s ease, transform 0.08s ease;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.97); }
  button[disabled] { opacity: 0.28; }
  button .arrow {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-weight: 400; opacity: 0.7;
  }
  .progress {
    height: 3px; background: var(--rule);
    overflow: hidden;
  }
  .progress > span {
    display: block; height: 100%; background: var(--amber);
    transition: width 0.2s ease;
  }
</style>
</head>
<body>
  <header>

  <footer>
    <button id="prev"><span class="arrow">←</span> ก่อนหน้า</button>
    <button id="next">ถัดไป <span class="arrow">→</span></button>

      ]
    },
    {
      label: 'Slide 6',
      paragraphs: [
        'ผมเข้าใจนะครับว่า เราไม่ได้มีเวลาที่จะนั่ง research ทุกสิ่งอย่างที่เราใช้ และมันก็ไม่ใช่ว่าจะหา who why กันได้ง่าย ๆ ด้วย',
        'แต่สิ่งที่ผมอยากจะสื่อ คือ เรา research เพื่อหา alignment ครับ เมื่อเราเข้าใจในปัญหาและบริบทของมันที่ผู้สร้างต้องการแก้ เราจะเลือกใช้เครื่องมือที่มันเข้ากับความตั้งใจของเรา และไม่มานั่งเสียใจภายหลังว่าเราไม่ได้ทำการบ้านมาดีพอที่จะเข้าใจข้อจำกัดที่เราไม่ได้เตรียมใจจะรับมัน'
      ]
    }
  ];

  const STORAGE_KEY = 'wwhw-flashcard-idx';
  const badge = document.getElementById('badge');
  const cur = document.getElementById('cur');
  const tot = document.getElementById('tot');
  const card = document.getElementById('card');
  const bar = document.getElementById('bar');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');

  let idx = 0;
  try {
    const saved = parseInt(localStorage.getItem(STORAGE_KEY) ?? '0', 10);
    if (Number.isFinite(saved) && saved >= 0 && saved < cards.length) idx = saved;
  } catch (e) { /* localStorage may be unavailable */ }

  tot.textContent = cards.length;

  function render() {
    const c = cards[idx];
    badge.textContent = c.label;
    cur.textContent = idx + 1;
    bar.style.width = (((idx + 1) / cards.length) * 100) + '%';
    card.innerHTML = c.paragraphs.map(p => {
      if (typeof p === 'string') {
        return '<p>' + p + '</p>';
      }
      return '<p class="hero">' + p.text + '</p>';
    }).join('');
    prev.disabled = (idx === 0);
    next.disabled = (idx === cards.length - 1);
    document.querySelector('main').scrollTop = 0;
    try { localStorage.setItem(STORAGE_KEY, String(idx)); } catch (e) {}
  }

  function go(delta) {
    const target = idx + delta;
    if (target < 0 || target >= cards.length) return;
    idx = target;
    render();
  }

  prev.addEventListener('click', () => go(-1));
  next.addEventListener('click', () => go(1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  });

  render();
</script>
</body>
</html>
